<!-- Initialize two variables and increment both the variables 
 \each time and display the addition of both the variables at interval of 1 second. -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
   <p id="a">a = 5</p>
   <p id="b">b = 7</p>
   <p id="ans"></p>
</body>
<script>
    let a = 5
    b= 7
let count =0 
   const i =  setInterval(()=>{
        document.getElementById("ans").innerHTML = ++a + ++b
        count++
        if(count===5){
            clearInterval(i)
        }
    },1000)

</script>
</html>
